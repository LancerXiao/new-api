name: Lint & Check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check shell scripts
        run: |
          apt-get update -qq && apt-get install -qq -y shellcheck
          shellcheck deploy.sh setup-ssl.sh backup.sh alert.sh key-pool-manager.sh firewall-setup.sh 2>/dev/null || true

      - name: Validate docker-compose
        run: |
          docker compose -f docker-compose.prod.yml config --quiet 2>/dev/null || \
            echo "Note: docker compose config validation requires all env vars"

      - name: Validate nginx config
        run: |
          docker run --rm -v $(pwd)/nginx/conf.d:/etc/nginx/conf.d:ro \
            nginx:alpine nginx -t -c /etc/nginx/nginx.conf 2>/dev/null || \
            echo "Note: nginx validation requires upstream services"
