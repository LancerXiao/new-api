global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # New API 应用指标（如果 New API 暴露了 /metrics 端点）
  - job_name: 'new-api'
    static_configs:
      - targets: ['new-api:3000']
    metrics_path: /api/metrics
    scrape_interval: 30s

  # Node Exporter - 系统指标
  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']

  # cAdvisor - 容器指标
  - job_name: 'cadvisor'
    static_configs:
      - targets: ['cadvisor:8080']

  # Prometheus 自身
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
